<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador Sorteo Mundial 2026 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fuentes y Estilos Base */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #d4af37 0%, #000000 50%, #4b360b 100%);
            min-height: 100vh;
            color: white;
            transition: background 0.5s ease;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        /* Animaciones */
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Grid Compacto Mobile */
        .compact-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.35rem;
        }
    </style>
</head>

<body class="flex flex-col">

    <!-- HEADER -->
    <div id="main-header"
        class="bg-black/40 backdrop-blur-lg border-b border-white/10 p-4 sticky top-0 z-40 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <img id="header-logo" src="https://www.el-area.com/sudamerica/galeria%20de%20logos%20conmebol/logo-libertadores-2018.png" alt="Logo"
                    style="width:80px; height:80px; object-fit:contain;">
                <h1 id="tourney-title" class="text-2xl font-black uppercase italic tracking-tighter">
                    LIBERTADORES <span class="text-yellow-400">2026</span>
                </h1>
            </div>
            
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="app.setTournament('LIB')"
                    class="px-4 py-2 rounded-lg font-bold text-xs uppercase transition-all bg-yellow-600 hover:bg-yellow-500 text-white shadow-lg border border-yellow-400/30">
                    Libertadores
                </button>
                <button onclick="app.setTournament('SUD')"
                    class="px-4 py-2 rounded-lg font-bold text-xs uppercase transition-all bg-blue-600 hover:bg-blue-500 text-white shadow-lg border border-blue-400/30">
                    Sudamericana
                </button>
            </div>

            <div class="flex gap-2 text-sm font-bold">
                <button onclick="app.autoFill()"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg transition-transform active:scale-95 bg-green-600 hover:bg-green-700 shadow-lg text-white">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l14.2-12.6c.8-1 2-1.7 3.3-1.7H22" />
                        <path d="M2 6h1.4c1.3 0 2.5.6 3.3 1.7l14.2 12.6c.8 1 2 1.7 3.3 1.7H22" />
                    </svg>
                    Auto
                </button>
                <button onclick="app.reset()"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg transition-transform active:scale-95 bg-red-600 hover:bg-red-700 shadow-lg text-white">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18" />
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                    </svg>
                    Reset
                </button>
                <button onclick="app.toggleCaptureMode(true)"
                    class="flex items-center gap-2 px-3 py-2 rounded-lg transition-transform active:scale-95 bg-white text-gray-800 hover:bg-gray-100 shadow-lg">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />
                        <circle cx="12" cy="13" r="3" />
                    </svg>
                    Captura
                </button>
            </div>
        </div>
    </div>

    <!-- MODO EDICION (MAIN GRID) -->
    <div id="editor-view" class="flex-grow p-4 md:p-8 max-w-[1600px] mx-auto w-full transition-all duration-300">
        <div id="groups-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <!-- JS Inject -->
        </div>
    </div>

    <!-- MODO CAPTURA COMPACTO (Overlay) -->
    <div id="capture-view" class="fixed inset-0 z-50 bg-[#0a1829] hidden flex-col items-center justify-center p-2">
        <button onclick="app.toggleCaptureMode(false)"
            class="absolute top-2 right-2 z-[60] bg-black/60 text-white p-2 rounded-full backdrop-blur-md border border-white/20 hover:bg-white/20 transition-colors">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>

        <div id="capture-view-border"
            class="w-full max-w-md bg-gradient-to-br from-gray-900 to-black p-3 rounded-2xl shadow-2xl relative flex flex-col h-auto max-h-full aspect-[9/16] sm:aspect-auto border-4 border-yellow-500/30">
            <div
                class="absolute top-0 left-0 w-32 h-32 bg-yellow-400 rounded-full mix-blend-overlay filter blur-[60px] opacity-20 pointer-events-none">
            </div>
            <div
                class="absolute bottom-0 right-0 w-32 h-32 bg-green-400 rounded-full mix-blend-overlay filter blur-[60px] opacity-20 pointer-events-none">
            </div>

            <div class="relative z-10 flex flex-col h-full">
                <div class="flex flex-col items-center mb-2 shrink-0">
                    <img id="capture-logo" src="https://www.el-area.com/sudamerica/galeria%20de%20logos%20conmebol/logo-libertadores-2018.png" alt="Logo"
                        style="width:60px; height:60px; object-fit:contain;" class="mb-1">
                    <h1 id="capture-title" class="text-xl font-black uppercase tracking-tighter italic drop-shadow-lg leading-tight">
                        LIBERTADORES <span class="text-yellow-400">2026</span>
                    </h1>
                </div>
                <div id="capture-grid" class="compact-grid grow">
                    <!-- JS Inject -->
                </div>
                <div class="text-center mt-2 shrink-0 opacity-60 text-[8px] font-bold tracking-[0.3em]">
                    SIMULADOR NO OFICIAL
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE SELECCIÓN -->
    <div id="selection-modal"
        class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/60 backdrop-blur-md fade-in">
        <div
            class="bg-[#0f172a] border border-white/20 w-full max-w-md rounded-2xl shadow-2xl flex flex-col max-h-[85vh]">
            <div class="p-4 border-b border-white/10 flex justify-between items-center bg-white/5 rounded-t-2xl">
                <h3 id="modal-title" class="font-bold text-lg">Elegir Equipo</h3>
                <button onclick="app.closeModal()" class="text-white/50 hover:text-white transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="modal-content" class="overflow-y-auto p-2 grid grid-cols-2 gap-2"></div>
            <div id="modal-empty" class="hidden p-4 text-center text-white/40 text-sm">No quedan equipos disponibles.
            </div>
        </div>
    </div>

    <script>
        const DATA_LIB = {
            1: [
                { id: 'FLA', name: 'Flamengo', flag: '🇧🇷', conf: 'CONMEBOL' }, { id: 'PAL', name: 'Palmeiras', flag: '🇧🇷', conf: 'CONMEBOL' },
                { id: 'BOC', name: 'Boca', flag: '🇦🇷', conf: 'CONMEBOL' }, { id: 'PEN', name: 'Peñarol', flag: '🇺🇾', conf: 'CONMEBOL' },
                { id: 'NAC', name: 'Nacional', flag: '🇺🇾', conf: 'CONMEBOL' }, { id: 'LDU', name: 'Liga de Quito', flag: '🇪🇨', conf: 'CONMEBOL' },
                { id: 'FLU', name: 'Fluminense', flag: '🇧🇷', conf: 'CONMEBOL' }, { id: 'IDV', name: 'Ind. del Valle', flag: '🇪🇨', conf: 'CONMEBOL' }
            ],
            2: [
                { id: 'LIB', name: 'Libertad', flag: '🇵🇾', conf: 'CONMEBOL' }, { id: 'EST', name: 'Estudiantes', flag: '🇦🇷', conf: 'CONMEBOL' },
                { id: 'CER', name: 'Cerro Porteño', flag: '🇵🇾', conf: 'CONMEBOL' }, { id: 'LAN', name: 'Lanús', flag: '🇦🇷', conf: 'CONMEBOL' },
                { id: 'COR', name: 'Corinthians', flag: '🇧🇷', conf: 'CONMEBOL' }, { id: 'BOL', name: 'Bolívar', flag: '🇧🇴', conf: 'CONMEBOL' },
                { id: 'CRU', name: 'Cruzeiro', flag: '🇧🇷', conf: 'CONMEBOL' }, { id: 'UNI', name: 'Universitario', flag: '🇵🇪', conf: 'CONMEBOL' }
            ],
            3: [
                { id: 'JUN', name: 'Junior', flag: '🇨🇴', conf: 'CONMEBOL' }, { id: 'UCA', name: 'U. Católica', flag: '🇨🇱', conf: 'CONMEBOL' },
                { id: 'ROS', name: 'Rosario Central', flag: '🇦🇷', conf: 'CONMEBOL' }, { id: 'SFE', name: 'Ind. Santa Fe', flag: '🇨🇴', conf: 'CONMEBOL' },
                { id: 'COQ', name: 'Coquimbo Unido', flag: '🇨🇱', conf: 'CONMEBOL' }, { id: 'ALW', name: 'Always Ready', flag: '🇧🇴', conf: 'CONMEBOL' },
                { id: 'DLG', name: 'Dep. La Guaira', flag: '🇻🇪', conf: 'CONMEBOL' }, { id: 'CUS', name: 'Cusco', flag: '🇵🇪', conf: 'CONMEBOL' }
            ],
            4: [
                { id: 'UCC', name: 'Univ. Central', flag: '🇻🇪', conf: 'CONMEBOL' }, { id: 'PLA', name: 'Platense', flag: '🇦🇷', conf: 'CONMEBOL' },
                { id: 'INR', name: 'Ind. Rivadavia', flag: '🇦🇷', conf: 'CONMEBOL' }, { id: 'MIR', name: 'Mirassol', flag: '🇧🇷', conf: 'CONMEBOL' },
                { id: 'BSC', name: 'Barcelona', flag: '🇪🇨', conf: 'CONMEBOL' }, { id: 'TOL', name: 'Dep. Tolima', flag: '🇨🇴', conf: 'CONMEBOL' },
                { id: 'SCS', name: 'Sporting Cristal', flag: '🇵🇪', conf: 'CONMEBOL' }, { id: 'DIM', name: 'DIM', flag: '🇨🇴', conf: 'CONMEBOL' }
            ]
        };

        const DATA_SUD = {
            1: [
                { id: 'RIV', name: 'River Plate', flag: '🇦🇷', conf: 'CONMEBOL' }, { id: 'ATM', name: 'Atl. Mineiro', flag: '🇧🇷', conf: 'CONMEBOL' },
                { id: 'SAO', name: 'São Paulo', flag: '🇧🇷', conf: 'CONMEBOL' }, { id: 'RAC', name: 'Racing', flag: '🇦🇷', conf: 'CONMEBOL' },
                { id: 'GRE', name: 'Gremio', flag: '🇧🇷', conf: 'CONMEBOL' }, { id: 'OLI', name: 'Olimpia', flag: '🇵🇾', conf: 'CONMEBOL' },
                { id: 'SAN', name: 'Santos', flag: '🇧🇷', conf: 'CONMEBOL' }, { id: 'AME', name: 'América de Cali', flag: '🇨🇴', conf: 'CONMEBOL' }
            ],
            2: [
                { id: 'SLO', name: 'San Lorenzo', flag: '🇦🇷', conf: 'CONMEBOL' }, { id: 'BRA', name: 'Bragantino', flag: '🇧🇷', conf: 'CONMEBOL' },
                { id: 'PAL_S', name: 'Palestino', flag: '🇨🇱', conf: 'CONMEBOL' }, { id: 'MIL', name: 'Millonarios', flag: '🇨🇴', conf: 'CONMEBOL' },
                { id: 'CAR', name: 'Caracas', flag: '🇻🇪', conf: 'CONMEBOL' }, { id: 'VAS', name: 'Vasco da Gama', flag: '🇧🇷', conf: 'CONMEBOL' },
                { id: 'CIE', name: 'Cienciano', flag: '🇵🇪', conf: 'CONMEBOL' }, { id: 'TIG', name: 'Tigre', flag: '🇦🇷', conf: 'CONMEBOL' }
            ],
            3: [
                { id: 'AUD', name: 'Audax Italiano', flag: '🇨🇱', conf: 'CONMEBOL' }, { id: 'BLO', name: 'Blooming', flag: '🇧🇴', conf: 'CONMEBOL' },
                { id: 'PUE', name: 'Puerto Cabello', flag: '🇻🇪', conf: 'CONMEBOL' }, { id: 'BOS', name: 'Boston River', flag: '🇺🇾', conf: 'CONMEBOL' },
                { id: 'MCI', name: 'Montevideo City', flag: '🇺🇾', conf: 'CONMEBOL' }, { id: 'CUE', name: 'Dep. Cuenca', flag: '🇪🇨', conf: 'CONMEBOL' },
                { id: 'IPE', name: 'Ind. Petrolero', flag: '🇧🇴', conf: 'CONMEBOL' }, { id: 'MAC', name: 'Macará', flag: '🇪🇨', conf: 'CONMEBOL' }
            ],
            4: [
                { id: 'AAT', name: 'Alianza Atl.', flag: '🇵🇪', conf: 'CONMEBOL' }, { id: 'BAR', name: 'Barracas Central', flag: '🇦🇷', conf: 'CONMEBOL' },
                { id: 'RIE', name: 'Dep. Riestra', flag: '🇦🇷', conf: 'CONMEBOL' }, { id: 'RFC', name: 'Recoleta FC', flag: '🇨🇱', conf: 'CONMEBOL' },
                { id: 'JUV', name: 'Juventud', flag: '🇺🇾', conf: 'CONMEBOL' }, { id: 'OHI', name: 'O\'Higgins', flag: '🇨🇱', conf: 'CONMEBOL' },
                { id: 'CRB', name: 'Carabobo', flag: '🇻🇪', conf: 'CONMEBOL' }, { id: 'BOT', name: 'Botafogo', flag: '🇧🇷', conf: 'CONMEBOL' }
            ]
        };

        const GROUP_NAMES = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

        class App {
            constructor() {
                this.state = {
                    currentTournament: 'LIB', // 'LIB' o 'SUD'
                    groups: [],
                    modalOpen: false,
                    selectionTarget: { groupIndex: -1, bombo: 1 }
                };
                this.init();
            }

            init() {
                this.reset();
            }

            setTournament(type) {
                this.state.currentTournament = type;
                this.updateTheme();
                this.reset();
            }

            updateTheme() {
                const body = document.body;
                const title = document.getElementById('tourney-title');
                const headerLogo = document.getElementById('header-logo');

                if (this.state.currentTournament === 'LIB') {
                    body.style.background = 'linear-gradient(135deg, #d4af37 0%, #000000 50%, #4b360b 100%)';
                    title.innerHTML = 'LIBERTADORES <span class="text-yellow-400">2026</span>';
                    headerLogo.src = 'https://www.el-area.com/sudamerica/galeria%20de%20logos%20conmebol/logo-libertadores-2018.png';
                } else {
                    body.style.background = 'linear-gradient(135deg, #1e40af 0%, #000000 50%, #3b82f6 100%)';
                    title.innerHTML = 'SUDAMERICANA <span class="text-blue-400">2026</span>';
                    headerLogo.src = 'https://www.el-area.com/sudamerica/galeria%20de%20logos%20conmebol/logo-sudamericana-2018.png';
                }
            }

            reset() {
                this.state.groups = GROUP_NAMES.map(letter => ({
                    name: letter,
                    isDoublePoints: false,
                    slots: { 1: null, 2: null, 3: null, 4: null }
                }));

                this.render();
            }

            isLocked(gIndex, b) {
                return false; // No hay bloqueos en estas copas
            }

            isX2Allowed(gIndex) {
                return true; // Todos los grupos pueden ser x2
            }

            render() {
                this.renderMainGrid();
                this.renderCaptureGrid();
            }

            renderMainGrid() {
                const container = document.getElementById('groups-grid');
                container.innerHTML = '';

                this.state.groups.forEach((group, gIndex) => {
                    const el = document.createElement('div');

                    const wrapperClass = group.isDoublePoints
                        ? 'border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.3)] bg-gradient-to-b from-[#132554] to-[#0f172a]'
                        : 'border-white/10 bg-white/5 hover:bg-white/10';

                    const headerBg = group.isDoublePoints ? 'bg-yellow-500/20 border-yellow-500/50' : 'bg-black/20 border-white/5';
                    const titleColor = group.isDoublePoints ? 'text-yellow-400' : 'text-white';

                    // Lógica del botón x2
                    let x2ButtonHTML = '';
                    if (this.isX2Allowed(gIndex)) {
                        const btnClass = group.isDoublePoints
                            ? 'bg-yellow-400 text-black border-yellow-400 hover:bg-yellow-300'
                            : 'bg-transparent text-white/50 border-white/20 hover:text-yellow-400 hover:border-yellow-400';
                        const starFill = group.isDoublePoints ? 'black' : 'none';

                        x2ButtonHTML = `
                            <button onclick="app.toggleDoublePoints(${gIndex})" class="flex items-center gap-1 px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider transition-colors border ${btnClass}">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="${starFill}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                x2
                            </button>
                        `;
                    }

                    el.className = `rounded-xl overflow-hidden border transition-all duration-300 ${wrapperClass}`;
                    el.innerHTML = `
                        <div class="flex justify-between items-center px-3 py-2 border-b ${headerBg}">
                            <span class="font-black text-lg ${titleColor}">GRUPO ${group.name}</span>
                            ${x2ButtonHTML}
                        </div>
                        <div class="p-2 space-y-1.5">
                            ${[1, 2, 3, 4].map(b => this.getSlotHTML(group.slots[b], gIndex, b)).join('')}
                        </div>
                    `;
                    container.appendChild(el);
                });
            }

            getSlotHTML(team, gIndex, b) {
                const locked = this.isLocked(gIndex, b);

                if (team) {
                    const cursorClass = locked ? 'cursor-default border-yellow-500/30 bg-yellow-900/10' : 'cursor-pointer border-white/5 hover:bg-white/20';
                    const clickEvent = locked ? '' : `onclick="app.handleSlotClick(${gIndex}, ${b})"`;
                    const lockIcon = locked ? '<svg class="w-3 h-3 text-yellow-500 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>' : '';

                    return `
                    <div ${clickEvent} class="h-10 flex items-center px-3 rounded-lg transition-all border bg-white/10 ${cursorClass}">
                        <span class="text-xl mr-3">${team.flag}</span>
                        <span class="font-bold text-sm truncate uppercase flex-1 text-white">${team.name}</span>
                        <span class="text-[9px] font-bold bg-black/40 px-1.5 py-0.5 rounded text-white/60 ml-2">${team.conf}</span>
                        ${lockIcon}
                    </div>`;
                } else {
                    return `
                    <div onclick="app.handleSlotClick(${gIndex}, ${b})" class="h-10 flex items-center px-3 rounded-lg cursor-pointer transition-all border bg-black/20 border-dashed border-white/10 hover:border-white/30 text-white/30">
                        <span class="mr-2 opacity-50 font-medium text-xs">B${b}</span>
                        <span class="text-xs font-medium">Seleccionar...</span>
                    </div>`;
                }
            }

            renderCaptureGrid() {
                const container = document.getElementById('capture-grid');
                container.innerHTML = '';

                this.state.groups.forEach(group => {
                    const el = document.createElement('div');
                    let styleClass = 'bg-white/10 border border-white/10';
                    let inlineStyle = '';
                    let titleClass = 'text-white';
                    let headerBg = 'bg-black/20';

                    if (group.isDoublePoints) {
                        styleClass = 'shadow-[0_0_10px_rgba(251,191,36,0.6)] border border-yellow-300 z-10';
                        inlineStyle = 'background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);';
                        titleClass = 'text-black';
                        headerBg = 'border-b border-black/10';
                    }

                    el.className = `relative rounded-lg overflow-hidden flex flex-col justify-between ${styleClass}`;
                    if (inlineStyle) el.style = inlineStyle;

                    const flagsHTML = [1, 2, 3, 4].map(b => `
                        <div class="flex items-center justify-center w-full h-full">
                            <span class="text-2xl drop-shadow-sm leading-none transform -translate-y-[1px]">
                                ${group.slots[b] ? group.slots[b].flag : '<span class="opacity-10 text-lg scale-75">⚪</span>'}
                            </span>
                        </div>
                    `).join('');

                    el.innerHTML = `
                        <div class="text-center py-0.5 ${headerBg}">
                            <span class="font-black text-sm ${titleClass}">${group.name}</span>
                        </div>
                        <div class="p-0.5 grid grid-cols-2 gap-x-1 gap-y-0 items-center justify-items-center grow">
                            ${flagsHTML}
                        </div>
                        ${group.isDoublePoints ? '<div class="absolute bottom-0 w-full text-center bg-black/10 leading-none pb-0.5"><span class="text-[6px] font-bold text-black uppercase tracking-widest">x2</span></div>' : ''}
                    `;
                    container.appendChild(el);
                });
            }

            handleSlotClick(gIndex, bombo) {
                if (this.isLocked(gIndex, bombo)) return;
                if (this.state.groups[gIndex].slots[bombo]) {
                    this.state.groups[gIndex].slots[bombo] = null;
                    this.render();
                } else {
                    this.openModal(gIndex, bombo);
                }
            }

            toggleDoublePoints(gIndex) {
                if (!this.isX2Allowed(gIndex)) return; // Protección extra
                this.state.groups[gIndex].isDoublePoints = !this.state.groups[gIndex].isDoublePoints;
                this.render();
            }

            openModal(gIndex, bombo) {
                this.state.selectionTarget = { groupIndex: gIndex, bombo };
                document.getElementById('modal-title').innerText = `Elegir Equipo (Bombo ${bombo})`;
                const container = document.getElementById('modal-content');
                container.innerHTML = '';

                const available = this.getAvailableTeams(bombo);

                if (available.length === 0) {
                    document.getElementById('modal-empty').classList.remove('hidden');
                } else {
                    document.getElementById('modal-empty').classList.add('hidden');
                    available.forEach(team => {
                        const selectable = this.checkConstraint(this.state.groups[gIndex], team);
                        const btn = document.createElement('button');
                        const baseClass = "flex flex-col p-3 rounded-xl border transition-all text-left group";
                        const activeClass = "bg-white/5 hover:bg-white/10 border-white/5 cursor-pointer";
                        const disabledClass = "bg-black/20 border-transparent opacity-40 cursor-not-allowed grayscale";
                        const badgeClass = selectable ? "bg-white/10 text-white/70" : "bg-red-500/20 text-red-300";

                        btn.className = `${baseClass} ${selectable ? activeClass : disabledClass}`;
                        btn.disabled = !selectable;
                        btn.onclick = () => { if (selectable) this.selectTeam(team); };

                        btn.innerHTML = `
                            <div class="flex justify-between w-full mb-2">
                                <span class="text-2xl transform group-hover:scale-110 transition-transform">${team.flag}</span>
                                <span class="text-[9px] font-bold px-1.5 py-0.5 rounded h-fit ${badgeClass}">${team.conf}</span>
                            </div>
                            <span class="font-bold text-xs uppercase text-white truncate w-full">${team.name}</span>
                        `;
                        container.appendChild(btn);
                    });
                }

                document.getElementById('selection-modal').classList.remove('hidden');
                document.getElementById('selection-modal').classList.add('flex');
            }

            closeModal() {
                document.getElementById('selection-modal').classList.add('hidden');
                document.getElementById('selection-modal').classList.remove('flex');
            }

            selectTeam(team) {
                const { groupIndex, bombo } = this.state.selectionTarget;
                this.state.groups[groupIndex].slots[bombo] = team;
                this.closeModal();
                this.render();
            }

            getAvailableTeams(bomboNum) {
                const data = this.state.currentTournament === 'LIB' ? DATA_LIB : DATA_SUD;
                const usedIds = this.state.groups.map(g => g.slots[bomboNum]?.id).filter(Boolean);
                return data[bomboNum].filter(t => !usedIds.includes(t.id));
            }

            checkConstraint(group, newTeam) {
                // Para estas copas no aplicaremos restricciones de confederación ya que todos son CONMEBOL
                return true;
            }

            autoFill() {
                const data = this.state.currentTournament === 'LIB' ? DATA_LIB : DATA_SUD;
                const newGroups = GROUP_NAMES.map(l => ({ name: l, isDoublePoints: false, slots: { 1: null, 2: null, 3: null, 4: null } }));

                const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

                [1, 2, 3, 4].forEach(potNum => {
                    let potTeams = shuffle(data[potNum]);
                    for (let i = 0; i < 8; i++) {
                        newGroups[i].slots[potNum] = potTeams[i];
                    }
                });

                this.state.groups = newGroups;
                this.render();
            }

            toggleCaptureMode(show) {
                const captureView = document.getElementById('capture-view');
                const captureBorder = document.getElementById('capture-view-border');
                const captureTitle = document.getElementById('capture-title');
                const captureLogo = document.getElementById('capture-logo');

                if (show) {
                    // Update capture style based on tournament
                    if (this.state.currentTournament === 'LIB') {
                        captureBorder.className = captureBorder.className.replace(/border-blue-500\/30/g, 'border-yellow-500/30');
                        captureBorder.className = captureBorder.className.replace(/from-blue-900/g, 'from-gray-900');
                        captureTitle.innerHTML = 'LIBERTADORES <span class="text-yellow-400">2026</span>';
                        captureLogo.src = 'https://www.el-area.com/sudamerica/galeria%20de%20logos%20conmebol/logo-libertadores-2018.png';
                    } else {
                        captureBorder.className = captureBorder.className.replace(/border-yellow-500\/30/g, 'border-blue-500/30');
                        captureBorder.className = captureBorder.className.replace(/from-gray-900/g, 'from-blue-900');
                        captureTitle.innerHTML = 'SUDAMERICANA <span class="text-blue-400">2026</span>';
                        captureLogo.src = 'https://www.el-area.com/sudamerica/galeria%20de%20logos%20conmebol/logo-sudamericana-2018.png';
                    }

                    captureView.classList.remove('hidden');
                    captureView.classList.add('flex');
                    document.body.style.overflow = 'hidden';
                } else {
                    captureView.classList.add('hidden');
                    captureView.classList.remove('flex');
                    document.body.style.overflow = 'auto';
                }
            }
        }

        const app = new App();
    </script>
</body>
